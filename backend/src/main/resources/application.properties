spring.application.name=card
server.port=${PORT:8085}
# Слушать на всех интерфейсах (для Fly.io/Docker)
server.address=0.0.0.0

# PostgreSQL (локально — значения по умолчанию, на Fly.io — через env/secrets)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chefcard}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:chefcard}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:chefcard}
spring.datasource.driver-class-name=org.postgresql.Driver
# Короткое время жизни соединений (Fly Postgres закрывает долгие idle-соединения)
spring.datasource.hikari.max-lifetime=60000
# Ждать до 60 сек подключения к БД при старте (Postgres на Fly может «просыпаться»)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=60000

# CORS (для Netlify укажи свой домен через env CORS_ALLOWED_ORIGINS)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# JPA
spring.jpa.hibernate.ddl-auto=validate

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
